name: Azure Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting and tests
      run: |
        # Optional: Add linting
        # pip install flake8
        # flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # Optional: Run tests
        # pip install pytest
        # pytest tests/
      continue-on-error: true

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_APP_NAME }}
        package: .
        startup-command: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 app:app"

    - name: Configure App Settings
      run: |
        az webapp config appsettings set \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --name ${{ secrets.AZURE_APP_NAME }} \
          --settings \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            AZURE_SEARCH_KEY="${{ secrets.AZURE_SEARCH_KEY }}" \
            AZURE_SEARCH_ENDPOINT="${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
            AZURE_SEARCH_INDEX="${{ secrets.AZURE_SEARCH_INDEX }}" \
            LEGAL_DICTIONARY_PATH="${{ secrets.LEGAL_DICTIONARY_PATH }}" \
            ECOURTS_API_URL="${{ secrets.ECOURTS_API_URL }}" \
            ECOURTS_API_KEY="${{ secrets.ECOURTS_API_KEY }}" \
            PYTHONUNBUFFERED="1"

    - name: Restart App Service
      run: |
        az webapp restart \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --name ${{ secrets.AZURE_APP_NAME }}

    - name: Health Check
      run: |
        sleep 5
        curl -f ${{ secrets.AZURE_APP_URL }}/health || echo "Health check endpoint not available"
      continue-on-error: true

    - name: Deployment Notification
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ Deployment to Azure successful!"
        else
          echo "❌ Deployment failed!"
        fi
